<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1320"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Leaf / plant icon -->
  <ellipse cx="256" cy="230" rx="90" ry="120" fill="url(#leaf)" transform="rotate(-25 256 230)" opacity="0.9"/>
  <ellipse cx="290" cy="240" rx="70" ry="100" fill="#22c55e" transform="rotate(15 290 240)" opacity="0.8"/>
  <!-- Stem -->
  <line x1="256" y1="340" x2="256" y2="420" stroke="#4ade80" stroke-width="16" stroke-linecap="round"/>
  <!-- Checkmark circle -->
  <circle cx="340" cy="380" r="55" fill="#22c55e"/>
  <polyline points="318,380 335,397 365,367" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
